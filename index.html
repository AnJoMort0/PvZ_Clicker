<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PvZ Clicker Prototype</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="playfield" aria-label="PvZ clicker board">
        <header class="top-chrome">
          <div class="sun-display" aria-live="polite">
            <div class="sun-display__icon" aria-hidden="true">☀️</div>
            <div id="sun-count" class="sun-display__value">0</div>
          </div>

          <div id="category-packets" class="seed-bank seed-bank--top" aria-label="Plant lines"></div>
        </header>

        <div class="rate-display" aria-live="polite">
          <span class="rate-display__icon" aria-hidden="true">☀️</span>
          <span id="sun-per-second">0</span>
          <span class="rate-display__unit">/s</span>
        </div>

        <aside id="upgrade-packets" class="seed-bank seed-bank--side" aria-label="Selected upgrades"></aside>

        <div class="stone-path" aria-hidden="true"></div>

        <section class="lane-scene" aria-label="Garden lane">
          <div class="lane-scene__grass" aria-hidden="true"></div>

          <div class="lane-scene__mower" aria-hidden="true">
            <span class="mower__handle"></span>
            <span class="mower__body"></span>
            <span class="mower__engine"></span>
            <span class="mower__wheel mower__wheel--left"></span>
            <span class="mower__wheel mower__wheel--right"></span>
          </div>

          <button id="sunflower" class="plant plant--sunflower" type="button" aria-label="Collect sun from sunflower">
            <span class="plant__shadow"></span>
            <span class="sunflower__bloom">🌻</span>
            <span class="sunflower__stem"></span>
            <span class="sunflower__leaf sunflower__leaf--left"></span>
            <span class="sunflower__leaf sunflower__leaf--right"></span>
          </button>

          <div id="peashooter-plant" class="plant plant--peashooter" aria-hidden="true">
            <span class="plant__shadow"></span>
            <span class="peashooter__head"></span>
            <span class="peashooter__snout"></span>
            <span class="peashooter__stem"></span>
            <span class="peashooter__leaf peashooter__leaf--left"></span>
            <span class="peashooter__leaf peashooter__leaf--right"></span>
          </div>

          <span class="pea pea--one" aria-hidden="true"></span>
          <span class="pea pea--two" aria-hidden="true"></span>
          <span class="pea pea--three" aria-hidden="true"></span>
        </section>

        <p id="event-log" class="sr-only">Your sunflower is ready. Gather sun and start building a lawn economy.</p>
      </section>
    </main>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
