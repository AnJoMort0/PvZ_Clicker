<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PvZ Clicker Prototype</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="seed-rail" aria-label="Plant categories">
        <div id="category-packets" class="packet-column"></div>
        <div id="upgrade-packets" class="packet-column packet-column-secondary"></div>
      </section>

      <section class="board-shell" aria-label="Game board">
        <header class="resource-bar">
          <div class="sun-bank" aria-live="polite">
            <div class="sun-bank__icon art-slot" aria-hidden="true">☀️</div>
            <div class="sun-bank__meta">
              <span class="resource-label">Sun</span>
              <strong id="sun-count">0</strong>
            </div>
          </div>

          <section class="resource-strip" aria-label="Income stats">
            <article class="resource-chip">
              <span class="resource-chip__label">Per click</span>
              <strong id="sun-per-click">1</strong>
            </article>
            <article class="resource-chip">
              <span class="resource-chip__label">Passive</span>
              <strong id="sun-per-second">0</strong>
            </article>
            <article class="resource-chip">
              <span class="resource-chip__label">Sky drop</span>
              <strong id="drop-rate">0</strong>
            </article>
          </section>
        </header>

        <section class="lawn-frame">
          <div class="sky-band" aria-hidden="true">
            <div class="sky-band__sun">☀️</div>
            <div class="sky-band__cloud sky-band__cloud--one"></div>
            <div class="sky-band__cloud sky-band__cloud--two"></div>
          </div>

          <div class="lawn-grid" aria-hidden="true">
            <span class="lane-number">1</span>
            <span class="lane-number">2</span>
            <span class="lane-number">3</span>
            <span class="lane-number">4</span>
            <span class="lane-number">5</span>
          </div>

          <button id="sunflower" class="hero-plant" type="button" aria-label="Collect sun">
            <span class="hero-plant__token art-slot">🌻</span>
            <span class="hero-plant__label">Sunflower</span>
          </button>

          <aside class="board-side-info">
            <div class="board-side-info__card">
              <span class="board-side-info__label">Lane</span>
              <strong>3</strong>
            </div>
            <div class="board-side-info__card">
              <span class="board-side-info__label">Weather</span>
              <strong id="weather-level">Clear</strong>
            </div>
          </aside>
        </section>

        <section class="event-panel" aria-live="polite">
          <p id="event-log">Your sunflower is ready. Gather sun and start building a lawn economy.</p>
        </section>
      </section>
    </main>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
