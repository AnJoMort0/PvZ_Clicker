<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PvZ Clicker Prototype</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="playfield" aria-label="PvZ clicker board">
        <div id="sun-particles" class="sun-particles" aria-hidden="true"></div>

        <header class="top-bar">
          <div class="sun-display" aria-live="polite">
            <div class="sun-display__icon" aria-hidden="true">☀️</div>
            <div id="sun-count" class="sun-display__value">50</div>
          </div>

          <section class="seed-bank" aria-label="Plant line menu">
            <div class="seed-bank__title">Seed Bank</div>
            <div id="top-packets" class="seed-bank__row"></div>
          </section>

          <div class="rate-display" aria-live="polite">
            <span class="rate-display__label">Passive</span>
            <span class="rate-display__value"><span id="sun-per-second">0.0</span> sun/s</span>
          </div>
        </header>

        <div class="board">
          <aside class="left-menu">
            <h2 class="panel-title">Sunflower Upgrades</h2>
            <div id="upgrade-packets" class="upgrade-list" aria-label="Sunflower upgrades"></div>
          </aside>

          <section class="lane-panel">
            <h2 class="panel-title">Lane 1</h2>
            <div class="lane-shell">
              <table class="lane-grid" aria-label="Garden lane">
                <tbody id="lane-grid"></tbody>
              </table>
            </div>
          </section>

          <aside class="almanac-panel" aria-live="polite">
            <h2 class="panel-title">Almanac</h2>
            <h3 id="almanac-name" class="almanac-panel__name">Sunflower</h3>
            <p id="almanac-stat" class="almanac-panel__stat"></p>
            <p id="almanac-description" class="almanac-panel__description"></p>
          </aside>
        </div>

        <p id="status-line" class="status-line" aria-live="polite">
          One lane, one Sunflower, and a frankly alarming amount of ambition.
        </p>
      </section>
    </main>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
